<div class="auth-shell">
  <div class="card auth-card">
    <h1 class="auth-title">Change Password</h1>
    <p class="auth-subtitle" *ngIf="isForcedChange">
      First time login detected. Please change your password to continue.
    </p>

    <form class="auth-form" (ngSubmit)="changePassword()">
      <div class="form-group">
        <label class="form-label" for="currentPassword">Current Password</label>
        <input
          id="currentPassword"
          type="password"
          class="form-control"
          [(ngModel)]="currentPassword"
          name="currentPassword"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          class="form-control"
          [(ngModel)]="newPassword"
          name="newPassword"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          class="form-control"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
        />
      </div>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="info-text">{{ successMessage }}</p>

      <button
        class="btn btn-primary auth-btn"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? "Updating..." : "Update Password" }}
      </button>
    </form>

    <a *ngIf="!isForcedChange" routerLink="/dashboard" class="auth-link"
      >Back to dashboard</a
    >
  </div>
</div>
