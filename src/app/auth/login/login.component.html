<div class="auth-shell">
  <div class="card auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to TalentMason recruiting portal</p>

    <form (ngSubmit)="login()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>

      <button
        class="btn btn-primary auth-btn"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? "Signing in..." : "Sign In" }}
      </button>
    </form>

    <a routerLink="/reset-password" class="auth-link">Forgot password?</a>
  </div>
</div>
