<div class="auth-shell">
  <div class="card auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to TalentMason recruiting portal</p>

    <div *ngIf="sessionExpired && !errorMessage" class="session-alert">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      Session expired. Please sign in again.
    </div>

    <form (ngSubmit)="login()" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <p *ngIf="errorMessage" class="error-text">
        {{ errorMessage }}
      </p>

      <button
        class="btn btn-primary auth-btn"
        type="submit"
        [disabled]="loading"
      >
        {{ loading ? "Signing in..." : "Sign In" }}
      </button>
    </form>

    <a routerLink="/reset-password" class="auth-link">Forgot password?</a>
  </div>
</div>
