<div class="auth-shell">
  <div class="card auth-card">
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Request a reset token and set a new password.</p>

    <div class="form-group">
      <label class="form-label" for="email">Work Email</label>
      <input
        id="email"
        type="email"
        class="form-control"
        [(ngModel)]="email"
        name="email"
      />
    </div>
    <button
      class="btn btn-outline auth-btn"
      type="button"
      [disabled]="loadingRequest"
      (click)="requestResetLink()"
    >
      {{ loadingRequest ? "Requesting..." : "Request Reset" }}
    </button>

    <hr class="auth-divider" />

    <form class="auth-form" (ngSubmit)="resetPassword()">
      <div class="form-group">
        <label class="form-label" for="token">Reset Token</label>
        <input
          id="token"
          type="text"
          class="form-control"
          [(ngModel)]="token"
          name="token"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <input
          id="newPassword"
          type="password"
          class="form-control"
          [(ngModel)]="newPassword"
          name="newPassword"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          class="form-control"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
        />
      </div>

      <p *ngIf="errorMessage" class="error-text">{{ errorMessage }}</p>
      <p *ngIf="infoMessage" class="info-text">{{ infoMessage }}</p>

      <button
        class="btn btn-primary auth-btn"
        type="submit"
        [disabled]="loadingReset"
      >
        {{ loadingReset ? "Resetting..." : "Reset Password" }}
      </button>
    </form>

    <a routerLink="/login" class="auth-link">Back to login</a>
  </div>
</div>
