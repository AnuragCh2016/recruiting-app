<div class="container p-4">
  <div class="mb-4">
    <a routerLink="/candidates" class="text-medium hover:underline text-sm"
      >Cancel</a
    >
  </div>

  <div class="card max-w-2xl mx-auto">
    <h2 class="mb-6 border-b pb-2">Add New Candidate</h2>

    <form [formGroup]="candidateForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-2 gap-4">
        <div class="form-group col-span-2">
          <label class="form-label">Full Name *</label>
          <input
            type="text"
            formControlName="fullName"
            class="form-control"
            placeholder="e.g. John Doe"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Email *</label>
          <input
            type="email"
            formControlName="email"
            class="form-control"
            placeholder="e.g. john.doe@example.com"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input
            type="text"
            formControlName="phone"
            class="form-control"
            placeholder="e.g. +1-234-567-8900"
          />
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Job Applied For *</label>
          <select formControlName="jobId" class="form-control">
            <option value="">Select a job...</option>
            <option *ngFor="let job of jobs$ | async" [value]="job.id">
              {{ job.roleTitle }} - {{ job.clientName }} ({{ job.jobCode }})
            </option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Total Experience (Years) *</label>
          <input
            type="number"
            formControlName="totalExperience"
            class="form-control"
            placeholder="e.g. 5"
            min="0"
            step="0.5"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Relevant Experience (Years) *</label>
          <input
            type="number"
            formControlName="relevantExperience"
            class="form-control"
            placeholder="e.g. 3"
            min="0"
            step="0.5"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Current CTC *</label>
          <input
            type="text"
            formControlName="currentCtc"
            class="form-control"
            placeholder="e.g. 8 LPA"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Expected CTC *</label>
          <input
            type="text"
            formControlName="expectedCtc"
            class="form-control"
            placeholder="e.g. 12 LPA"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Notice Period *</label>
          <input
            type="text"
            formControlName="noticePeriod"
            class="form-control"
            placeholder="e.g. 30 days"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Current Location *</label>
          <input
            type="text"
            formControlName="currentLocation"
            class="form-control"
            placeholder="e.g. Bangalore, India"
          />
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Resume URL</label>
          <input
            type="url"
            formControlName="resumeUrl"
            class="form-control"
            placeholder="https://example.com/resume.pdf"
          />
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Notes</label>
          <textarea
            formControlName="notes"
            class="form-control"
            rows="3"
            placeholder="Any additional notes about the candidate..."
          ></textarea>
        </div>
      </div>

      <div class="flex justify-end gap-4 mt-6 border-t pt-4">
        <button type="button" routerLink="/candidates" class="btn btn-outline">
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="candidateForm.invalid"
        >
          Add Candidate
        </button>
      </div>
    </form>
  </div>
</div>
