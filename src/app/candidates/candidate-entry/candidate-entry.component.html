<div
  class="container min-h-[80vh] flex flex-col items-center justify-center p-4"
>
  <h1 class="text-2xl font-bold text-gray-800 mb-8">
    How would you like to add the candidate?
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
    <div
      (click)="fileInput.click()"
      class="group cursor-pointer bg-white border-2 border-dashed border-gray-300 rounded-3xl p-10 flex flex-col items-center justify-center hover:border-blue-500 hover:bg-blue-50 transition-all duration-300 shadow-sm"
    >
      <div
        class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"
          />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-700">Upload Resume</h3>
      <p class="text-gray-500 text-center mt-2 text-sm">
        AI will parse details automatically
      </p>
      <input
        #fileInput
        type="file"
        (change)="onFileSelected($event)"
        class="hidden"
        accept=".pdf,.docx"
      />
    </div>

    <div
      routerLink="/add-candidate"
      [queryParams]="{ jobId: jobId }"
      class="group cursor-pointer bg-white border-2 border-gray-100 rounded-3xl p-10 flex flex-col items-center justify-center hover:border-green-500 hover:bg-green-50 transition-all duration-300 shadow-sm"
    >
      <div
        class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-8 w-8"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
          />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-700">Fill Manually</h3>
      <p class="text-gray-500 text-center mt-2 text-sm">
        Enter all details from scratch
      </p>
    </div>
  </div>

  <div
    *ngIf="isParsing"
    class="fixed inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-50"
  >
    <div
      class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"
    ></div>
    <p class="font-bold text-blue-600 animate-pulse">Parsing resume...</p>
  </div>
</div>
