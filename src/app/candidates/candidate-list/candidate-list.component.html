<div class="container p-4">
  <div class="flex justify-between items-center mb-4">
    <h1>All Candidates</h1>
    <a routerLink="/add-candidate" class="btn btn-primary">+ Add New Candidate</a>
  </div>

  <div class="card p-4">
    <div class="flex items-center gap-4 mb-4">
      <span class="font-bold">Filter by Status:</span>
      <select [(ngModel)]="statusFilter" class="form-control" style="width: auto;">
        <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
      </select>
    </div>

    <table class="table" *ngIf="candidates$ | async as candidates">
      <thead>
        <tr>
          <th>Name</th>
          <th>Applied For</th>
          <th>Experience</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let candidate of getFilteredCandidates(candidates)">
          <td>
            <div class="font-bold">{{ candidate.fullName }}</div>
            <div class="text-sm text-medium">{{ candidate.email }}</div>
          </td>
          <td>
            <a [routerLink]="['/jobs', candidate.jobId]" class="hover:underline text-primary">
              {{ candidate.jobTitle }}
            </a>
          </td>
          <td>{{ candidate.totalExperience }}</td>
          <td>
            <div *ngIf="editingCandidateId === candidate.id">
              <select [(ngModel)]="tempStatus" class="form-control text-xs py-1 px-2 h-auto w-auto">
                <option *ngFor="let s of statuses.slice(1)" [value]="s">{{ s }}</option>
              </select>
            </div>
            <div *ngIf="editingCandidateId !== candidate.id">
              <span class="badge" [ngClass]="'status-' + candidate.status.toLowerCase().replace(' ', '-')">
                {{ candidate.status }}
              </span>
            </div>
          </td>
          <td>
            <div *ngIf="editingCandidateId === candidate.id" class="flex gap-2 items-center">
              <button (click)="saveStatus(candidate)" class="btn btn-icon btn-sm text-green-600 hover:bg-green-50"
                title="Save">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                  <polyline points="17 21 17 13 7 13 7 21"></polyline>
                  <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
              </button>
              <a [routerLink]="['/candidates/edit', candidate.id]" class="btn btn-sm btn-outline text-xs px-2 py-1">Edit
                Profile</a>
              <button (click)="cancelEditing()" class="btn btn-icon btn-sm text-gray-500 hover:bg-gray-100"
                title="Cancel">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
            <div *ngIf="editingCandidateId !== candidate.id">
              <button (click)="startEditing(candidate)" class="btn btn-icon btn-sm btn-ghost" title="Edit Status">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <div *ngIf="(candidates$ | async)?.length === 0" class="p-4 text-center text-medium">
      No candidates found.
    </div>
  </div>
</div>
