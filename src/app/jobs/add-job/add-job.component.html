<div class="container p-4">
  <div class="mb-4">
    <a routerLink="/jobs" class="text-medium hover:underline text-sm">Cancel</a>
  </div>

  <div class="card max-w-2xl mx-auto">
    <h2 class="mb-6 border-b pb-2">
      {{ isEditMode ? "Edit Job" : "Add New Job" }}
    </h2>

    <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">
      <div class="grid grid-cols-2 gap-4">
        <div class="form-group col-span-2">
          <label class="form-label">Job Title *</label>
          <input
            type="text"
            formControlName="roleTitle"
            class="form-control"
            placeholder="e.g. Senior Frontend Engineer"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Job Code *</label>
          <input
            type="text"
            formControlName="jobCode"
            class="form-control"
            placeholder="e.g. FE-101"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Company Name *</label>
          <input
            type="text"
            formControlName="clientName"
            class="form-control"
            placeholder="e.g. Acme Corp"
          />
        </div>

        <div class="form-group">
          <label class="form-label">Location *</label>
          <input
            type="text"
            formControlName="location"
            class="form-control"
            placeholder="e.g. Remote, New York"
          />
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Experience (Years) *</label>
          <div class="flex gap-4">
            <input
              type="number"
              formControlName="minExp"
              class="form-control"
              placeholder="Min (e.g. 3)"
            />
            <input
              type="number"
              formControlName="maxExp"
              class="form-control"
              placeholder="Max (e.g. 5)"
            />
          </div>
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Salary Range (Optional)</label>
          <div class="flex gap-4">
            <input
              type="number"
              formControlName="minCompensation"
              class="form-control"
              placeholder="Min Salary"
            />
            <input
              type="number"
              formControlName="maxCompensation"
              class="form-control"
              placeholder="Max Salary"
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Cooldown Period (Days)</label>
          <input
            type="number"
            formControlName="cooldownPeriod"
            class="form-control"
            placeholder="e.g. 180"
          />
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Job Description *</label>
          <textarea
            formControlName="description"
            class="form-control resize-y"
            rows="6"
            placeholder="Enter detailed job description..."
          ></textarea>
        </div>

        <div class="form-group col-span-2">
          <label class="form-label">Job Description Document (Optional)</label>
          <input
            type="file"
            (change)="onJdFileChange($event)"
            accept=".pdf,.docx"
            class="form-control"
          />
          <small class="text-gray-500">Upload PDF or DOCX file</small>
        </div>
        <div class="form-group col-span-2 mt-4">
          <label class="form-label font-semibold"
            >Sourcing Tracker Format (Optional)</label
          >
          <input
            type="file"
            (change)="onFileChange($event)"
            accept=".xlsx, .xls"
            class="form-control"
          />
          <small class="text-gray-500"
            >Upload Excel file to define custom headers</small
          >

          <div
            *ngIf="customFields.length > 0"
            class="mt-3 p-3 bg-blue-50 border border-blue-100 rounded w-full"
          >
            <h4 class="font-bold text-xs uppercase text-blue-600 mb-2">
              Detected Custom Tracker Fields:
            </h4>
            <div
              class="flex flex-wrap gap-2 w-full overflow-x-auto"
              style="flex-wrap: wrap"
            >
              <span
                *ngFor="let field of customFields"
                class="inline-block badge bg-blue-200 text-blue-800 px-2 py-1 rounded text-xs truncate max-w-[180px] flex-shrink-0"
                [title]="field"
              >
                {{ field }}
              </span>
            </div>
            <p class="mt-3 text-xs text-gray-400 italic">
              * Core fields (Name, CTC, NP, etc.) are automatically excluded.
            </p>
          </div>
        </div>
      </div>

      <div class="flex justify-end gap-4 mt-6 border-t pt-4">
        <button type="button" routerLink="/jobs" class="btn btn-outline">
          Cancel
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="jobForm.invalid"
        >
          {{ isEditMode ? "Update Job" : "Create Job" }}
        </button>
      </div>
    </form>
  </div>
</div>
