<div class="container p-4">
  <div class="flex justify-between items-center mb-4">
    <h1>Jobs</h1>
    <a routerLink="/add-job" class="btn btn-primary">+ Add New Job</a>
  </div>

  <div class="card p-0">
    <table class="table">
      <thead>
        <tr>
          <th>Job Code</th>
          <th>Title</th>
          <th>Location</th>
          <th>Status</th>
          <th>Candidates</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let job of jobs$ | async">
          <td class="text-medium">{{ job.jobCode }}</td>
          <td>
            <a
              [routerLink]="['/jobs', job.id]"
              class="font-bold text-primary hover:underline"
            >
              {{ job.roleTitle }}
            </a>
            <div class="text-sm text-medium">{{ job.clientName }}</div>
          </td>
          <td>{{ job.location }}</td>
          <td>
            <span
              class="badge"
              [ngClass]="{
                'bg-green-100 text-green-800': job.status === 'Open',
                'bg-red-100 text-red-800': job.status === 'Closed',
              }"
            >
              {{ job.status }}
            </span>
          </td>
          <td>
            <div class="flex items-center gap-2">
              <span class="font-bold">{{ job.appCount || 0 }}</span>
              <span class="text-sm text-medium">Active</span>
            </div>
          </td>
          <td>
            <a [routerLink]="['/jobs', job.id]" class="btn btn-sm btn-outline"
              >View</a
            >
          </td>
        </tr>
      </tbody>
    </table>

    <div
      *ngIf="(jobs$ | async)?.length === 0"
      class="p-4 text-center text-medium"
    >
      No jobs found. Start by adding one!
    </div>
  </div>
</div>
